<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Machine</title>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1508739773434-c26b3d09e071?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(10, 10, 10, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            background: #222;
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 5px;
            text-align: center;
            width: 150px;
            margin-bottom: 20px;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Time Machine</h1>
    <p>Enter the destination year to temporal travel:</p>
    
    <input type="number" id="targetYear" placeholder="e.g. 2050" required><br>
    <button onclick="startTimeTravel()">Travel</button>
</div>

<script>
    function startTimeTravel() {
        const year = document.getElementById('targetYear').value;
        if(year) {
            
            // Aap ki batayi hui nayi instagram reel ka link yahan set hai
            window.location.href = "https://www.instagram.com/reel/DYUL8ByyC2f/";
        } else {
            alert("Please input a valid year first!");
        }
    }
</script>

</body>
</html>
