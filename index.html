<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Time Machine">
    <meta property="og:description" content="Enter your destination year to travel through time!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=600">
    <meta property="og:type" content="website">

    <title>Time Machine</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0d0d0d url('https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=1200') no-repeat center center fixed;
            background-size: cover;
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(10, 25, 20, 0.85);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px #00ffcc;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #88ffcc;
        }
        input[type="number"] {
            background: #000;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 12px;
            font-size: 1.5rem;
            text-align: center;
            width: 150px;
            margin-bottom: 25px;
            border-radius: 5px;
            outline: none;
            box-shadow: inset 0 0 5px #00ffcc;
        }
        input[::-webkit-outer-spin-button],
        input[::-webkit-inner-spin-button] {
            -webkit-appearance: none;
            margin: 0;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00ffcc;
        }
        button:hover {
            background: #000;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>TIME MACHINE</h1>
        <p>Enter the destination year to temporal travel:</p>
        <input type="number" id="yearInput" placeholder="00">
        <br>
        <button onclick="startTravel()">TRAVEL</button>
    </div>

    <script>
        function startTravel() {
            var year = document.getElementById("yearInput").value;
            if(year === "") {
                document.getElementById("yearInput").focus();
                return;
            }
            
            // Redirecting directly to your exact correct Instagram Reel
            window.location.href = "https://www.instagram.com/reel/DYUL8ByyC2f/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ=="; 
        }
    </script>
</body>
</html>
